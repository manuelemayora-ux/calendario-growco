<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growco | Calendario de Contenido</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="login-screen" class="screen active">
        <div id="login-bg-image"></div>
        <div class="glass-card login-card">
            <img src="logo.png" alt="Growco Logo" class="logo" onerror="this.src='https://via.placeholder.com/200x60?text=Growco';">
            <h2>Acceso Privado</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
                <p id="login-error" class="error-message">Credenciales incorrectas.</p>
            </form>
        </div>
    </div>

    <!-- Pantalla del Dashboard -->
    <div id="dashboard-screen" class="screen">
        <header class="dashboard-header">
            <img src="logo.png" alt="Growco Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/150x45?text=Growco';">
            <h1>Calendario de Contenidos</h1>
            <button id="logout-btn" class="btn-secondary">Cerrar Sesión</button>
        </header>

        <main class="dashboard-content">
            <div id="loading" class="loading">Cargando contenidos...</div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Cards renderizadas dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Fullscreen Image Modal -->
    <div id="image-modal" class="modal">
        <span class="close-modal" id="close-modal">&times;</span>
        <img class="modal-content" id="modal-img">
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
